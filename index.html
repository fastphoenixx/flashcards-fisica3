<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#15171c">
<title>Física 3 · P3 — Questões Resolvidas</title>
<style>
  :root{
    --ground:#15171c; --ground-2:#0e1014;
    --surface:#1c1f27; --surface-2:#232734;
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.06);
    --ink:#edf0f5; --muted:#95a0b1; --faint:#6b7585;
    --heat:#ff7a33; --heat-soft:rgba(255,122,51,.14);
    --steel:#6fb0e0; --steel-soft:rgba(111,176,224,.13);
    --good:#5fd694; --good-soft:rgba(95,214,148,.15);
    --purp:#b58cf0; --gold:#f0c65f;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Cascadia Code","JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font-family:var(--sans); color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(255,122,51,.10), transparent 55%),
      radial-gradient(90% 70% at 90% 110%, rgba(111,176,224,.07), transparent 60%),
      var(--ground);
    display:flex; flex-direction:column; min-height:100dvh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%; max-width:660px; margin:0 auto; padding:0 18px}

  header{padding-top:22px; padding-bottom:14px}
  .brand{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap}
  .eb{font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint)}
  .brand h1{margin:0; font-size:19px; font-weight:650; letter-spacing:-.01em}
  .brand h1 span{color:var(--muted); font-weight:500}
  .chips{display:flex; gap:7px; margin-top:16px; flex-wrap:wrap}
  .chips+.chips{margin-top:8px}
  .chip{
    font-family:var(--mono); font-size:12px; letter-spacing:.04em;
    color:var(--muted); background:var(--surface); border:1px solid var(--line);
    padding:7px 13px; border-radius:999px; cursor:pointer; transition:.16s;
  }
  .chip:hover{border-color:rgba(255,255,255,.22); color:var(--ink)}
  .chip[aria-pressed="true"]{background:#fff; color:#15171c; border-color:#fff; font-weight:600}
  .chip.star{color:var(--heat); border-color:rgba(255,122,51,.4)}
  .chip.star[aria-pressed="true"]{background:var(--heat); color:#1a0f06; border-color:var(--heat)}

  .meter{display:flex; align-items:center; gap:12px; margin-top:16px}
  .bar{flex:1; height:5px; border-radius:99px; background:var(--surface-2); overflow:hidden}
  .bar>i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--heat),#ffb37a); border-radius:99px; transition:width .3s ease}
  .count{font-family:var(--mono); font-size:12px; color:var(--muted); white-space:nowrap; font-variant-numeric:tabular-nums}
  .count b{color:var(--ink); font-weight:600}
  .dom{font-family:var(--mono); font-size:11.5px; color:var(--good); white-space:nowrap}

  main{flex:1; display:flex; align-items:center; justify-content:center; overflow:auto; padding:12px 0 6px}
  .stage{width:100%; max-width:660px; padding:0 18px; perspective:1600px}
  .card{position:relative; cursor:pointer; outline:none}
  .card:focus-visible .inner{box-shadow:0 0 0 2px var(--heat), 0 24px 60px -28px rgba(0,0,0,.7)}
  .inner{
    display:grid; transform-style:preserve-3d; transition:transform .5s cubic-bezier(.2,.7,.2,1);
    min-height:360px; border-radius:20px;
    box-shadow:0 24px 60px -30px rgba(0,0,0,.75);
  }
  .card.flip .inner{transform:rotateY(180deg)}
  .face{
    grid-area:1/1; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    background:linear-gradient(180deg,var(--surface-2),var(--surface));
    border:1px solid var(--line); border-radius:20px; padding:26px 26px 24px;
    display:flex; flex-direction:column; gap:16px; overflow-wrap:anywhere;
  }
  .face::before{content:""; position:absolute; inset:0 0 auto 0; height:3px; border-radius:20px 20px 0 0;
    background:var(--accent,var(--heat)); opacity:.9}
  .back{transform:rotateY(180deg)}
  .card.b1 .face{--accent:var(--heat)}
  .card.b2 .face{--accent:var(--steel)}
  .card.b3 .face{--accent:var(--good)}
  .card.b4 .face{--accent:var(--purp)}
  .card.bx .face{--accent:var(--gold)}
  .card.bp .face{--accent:#fff}

  .tag{display:flex; align-items:center; justify-content:space-between; gap:10px}
  .tag .lbl{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--accent,var(--heat)); font-weight:600}
  .tag .side{font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint)}

  .term{font-size:20px; line-height:1.28; font-weight:650; letter-spacing:-.01em; text-wrap:balance; margin:auto 0}
  .answer{font-size:15.5px; line-height:1.62; margin:auto 0; font-weight:450; white-space:pre-line}
  .answer strong{color:var(--ink); font-weight:700}
  .hint{margin-top:auto; font-family:var(--mono); font-size:11px; letter-spacing:.05em; color:var(--faint); display:flex; align-items:center; gap:6px}
  .knownmark{position:absolute; top:16px; right:18px; font-size:12px; color:var(--good); font-family:var(--mono); letter-spacing:.1em; opacity:0; transition:.2s}
  .card.known .knownmark{opacity:1}

  .empty{width:100%; max-width:660px; text-align:center; padding:40px 24px; color:var(--muted)}
  .empty .big{font-size:40px; margin-bottom:12px}

  footer{padding:14px 0 max(18px,env(safe-area-inset-bottom))}
  .nav{display:flex; align-items:center; gap:10px}
  button{font-family:var(--sans); cursor:pointer; border:1px solid var(--line); color:var(--ink);
    background:var(--surface); border-radius:13px; transition:.15s; font-size:14px}
  button:hover{border-color:rgba(255,255,255,.25)}
  button:focus-visible{outline:2px solid var(--heat); outline-offset:2px}
  button:active{transform:translateY(1px)}
  .arrow{width:52px; height:52px; font-size:20px; display:grid; place-items:center; flex:none; color:var(--muted)}
  .flipbtn{flex:1; height:52px; font-weight:650; font-size:15.5px; letter-spacing:.01em;
    background:var(--heat); color:#1a0f06; border-color:var(--heat)}
  .flipbtn:hover{background:#ff8c4d; border-color:#ff8c4d}
  .sub{display:flex; gap:9px; margin-top:11px; flex-wrap:wrap; justify-content:center}
  .sub button{padding:9px 15px; font-size:13px; color:var(--muted); font-family:var(--mono); letter-spacing:.03em}
  .sub button:hover{color:var(--ink)}
  .sub button.on{background:var(--good-soft); border-color:rgba(95,214,148,.4); color:var(--good)}
  .kbd{font-family:var(--mono); font-size:11px; color:var(--faint); text-align:center; margin-top:12px; letter-spacing:.03em}
  .kbd b{color:var(--muted); font-weight:500}

  @media (max-width:520px){
    .term{font-size:18px}
    .answer{font-size:14.5px}
    .arrow{width:46px;height:50px}
    .kbd{display:none}
    .inner{min-height:340px}
  }
  @media (prefers-reduced-motion:reduce){ .inner{transition:none} .bar>i{transition:none} }
</style>

<header>
  <div class="wrap">
    <div class="brand">
      <span class="eb">Física 3 · UnB · Prof. Fábio · 3ª Prova</span>
    </div>
    <div class="brand" style="margin-top:4px">
      <h1>Questões resolvidas <span>— passo a passo, só o que cai</span></h1>
    </div>
    <div class="chips" role="group" aria-label="Foco">
      <button class="chip" data-deck="all" aria-pressed="true">Tudo</button>
      <button class="chip star" data-deck="prio" aria-pressed="false">★ Prioridade (Q1·Q3·Extra)</button>
    </div>
    <div class="chips" role="group" aria-label="Questão">
      <button class="chip" data-pdeck="all" aria-pressed="true">Todas</button>
      <button class="chip" data-pdeck="1" aria-pressed="false">Q1 Capacit.</button>
      <button class="chip" data-pdeck="2" aria-pressed="false">Q2 Dielétr.</button>
      <button class="chip" data-pdeck="3" aria-pressed="false">Q3 Corrente</button>
      <button class="chip" data-pdeck="4" aria-pressed="false">Q4 Resist.</button>
      <button class="chip star" data-pdeck="x" aria-pressed="false">★ Extra</button>
    </div>
    <div class="meter">
      <span class="count">carta <b id="pos">1</b> / <span id="total">0</span></span>
      <div class="bar"><i id="progfill"></i></div>
      <span class="dom" id="dom">dominadas 0/0</span>
    </div>
  </div>
</header>

<main>
  <div class="stage">
    <div class="card" id="card" tabindex="0" role="button" aria-label="Card — toque para virar">
      <span class="knownmark">✓ dominada</span>
      <div class="inner">
        <div class="face front" id="front"></div>
        <div class="face back" id="back"></div>
      </div>
    </div>
    <div class="empty" id="empty" hidden>
      <div class="big">✓</div>
      <div>Você dominou tudo neste filtro.<br>Troque o filtro ou reinicie para revisar de novo.</div>
    </div>
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="nav">
      <button class="arrow" id="prev" aria-label="Anterior">‹</button>
      <button class="flipbtn" id="flip">Ver resolução</button>
      <button class="arrow" id="next" aria-label="Próxima">›</button>
    </div>
    <div class="sub">
      <button id="know">Marcar "sei"</button>
      <button id="hide">Esconder dominadas</button>
      <button id="shuffle">Embaralhar</button>
      <button id="reset">Reiniciar</button>
    </div>
    <div class="kbd"><b>←/→</b> navegar · <b>espaço</b> virar · <b>K</b> sei · <b>S</b> embaralhar</div>
  </div>
</footer>

<script>
// Deck ENXUTO — só as 5 questões da prova (do "Anotações do professor.txt"),
// resolvidas passo a passo com base nas duas P3 reais do Prof. Fábio (1º e 2º sem/2025).
const CARDS = [
  {p:"plano", prio:true, head:"Leia primeiro", term:"⚡ Plano de ataque em ~2h",
   ans:"Ordem por retorno/tempo:\n<strong>1º) Q3 (corrente)</strong> — só plugar número, ~2,5 pts quase certos.\n<strong>2º) Q1 (capacitância, a 'fácil')</strong> — receita Gauss → ΔV → C.\n<strong>3º) Extra</strong> — 2 deduções curtas (1,0 pt).\n<strong>4º) Q2 (dielétricos)</strong> — pegue os cálculos (b,c,d) + o desenho.\n<strong>Sacrifique a Q4</strong> (dedução do Drude) se faltar tempo.\n\nSó <strong>Q3 + Q1 = 5,0 → já passa.</strong>"},

  // ===================== Q1 — CAPACITÂNCIA (a 'fácil') =====================
  {p:"1", prio:true, head:"Enunciado", term:"Q1 — Capacitância: o que costuma cair",
   ans:"Duas variantes do Fábio:\n• <strong>Placas planas</strong> (área A, +Q/−Q, distância D, D ≪ √A)\n• <strong>Cabo coaxial</strong> (fio raio a, casca raio b)\nSempre a MESMA receita:\n<strong>(1)</strong> Gauss → E · <strong>(2)</strong> integral de caminho → ΔV · <strong>(3)</strong> C = Q/ΔV.\nOs próximos cards resolvem letra por letra."},
  {p:"1", prio:true, head:"Q1 · letra (a)", term:"Placas planas: campo elétrico FORA e ENTRE (Lei de Gauss)",
   ans:"σ = Q/A. Cada placa cria E = σ/2ε₀.\n<strong>Fora</strong> das placas os campos se cancelam → <strong>E_out = 0</strong>.\n<strong>Entre</strong> as placas eles se somam → <strong>E_in = σ/ε₀ = Q/(ε₀A)</strong>.\nGauss formal: cilindro com 1 tampa dentro do condutor (E=0) e outra entre as placas → E·A = σA/ε₀ ⇒ E = σ/ε₀."},
  {p:"1", prio:true, head:"Q1 · letra (b)", term:"Potencial V(z), com z = 0 no meio das placas",
   ans:"E é uniforme, da placa (+) para a (−). Como E = −dV/dz:\n<strong>V(z) = −∫E dz = −E·z</strong> (tomando V(0) = 0)\n⇒ <strong>V(z) = −(Q/ε₀A)·z</strong>, válido em −D/2 ≤ z ≤ D/2.\nddp entre as placas: <strong>ΔV = E·D = QD/(ε₀A)</strong>."},
  {p:"1", prio:true, head:"Q1 · letra (c)", term:"Capacitância das placas planas",
   ans:"<strong>C = Q/|ΔV| = Q / [QD/(ε₀A)]</strong>\n⇒ <strong>C = ε₀A/D</strong> ✅\n(O Q sempre se cancela — sobra só a geometria.)"},
  {p:"1", prio:true, head:"Q1 · variante", term:"Se cair o CABO COAXIAL — resolvido inteiro",
   ans:"λ = Q/ℓ.\n<strong>(a)</strong> linhas radiais do fio(+) p/ a casca(−), só entre a e b (E=0 dentro do fio e fora da casca).\n<strong>(b)</strong> Gauss (cilindro raio r): E·2πrℓ = Q/ε₀ ⇒ <strong>E = 2kλ/r</strong>.\n<strong>(c)</strong> |ΔV| = ∫ₐᵇ E dr = <strong>2kλ·ln(b/a)</strong>.\n<strong>(d)</strong> C = Q/|ΔV| = <strong>ℓ/[2k·ln(b/a)]</strong> = 2πε₀ℓ/ln(b/a)."},

  // ===================== Q2 — DIELÉTRICOS =====================
  {p:"2", prio:false, head:"Enunciado", term:"Q2 — Dielétricos (placas circulares de madeira)",
   ans:"Placas circulares R = 5 cm, cilindro de madeira h = 0,5 mm, κ = 3,5. Pilha fem = 1,5 V. Rigidez da madeira = 16 kV/mm.\nPede: (a) mostrar C = κε₀πR²/h · (b) C numérico · (c) carga máxima · (d) ddp máxima.\n<strong>DICA: DESENHE</strong> as duas placas com o dielétrico no meio e as linhas de campo (+ → −)."},
  {p:"2", prio:false, head:"Q2 · letra (a)", term:"Mostrar que C = κ·ε₀·(πR²)/h",
   ans:"Definição C = Q/ΔV. Com dielétrico o campo cai por κ:\n<strong>E = E₀/κ = σ/(κε₀) = Q/(κε₀A)</strong>.\nddp: ΔV = E·h = Qh/(κε₀A).\nC = Q/ΔV = <strong>κε₀A/h</strong>. Como A = πR²:\n⇒ <strong>C = κε₀(πR²)/h</strong> ✅"},
  {p:"2", prio:false, head:"Q2 · letra (b)", term:"Valor numérico de C (R=5cm, h=0,5mm, κ=3,5)",
   ans:"C = κε₀πR²/h\n= 3,5 × 8,854×10⁻¹² × π(0,05)² / (5×10⁻⁴)\n[ πR² = 7,85×10⁻³ m² ]\n⇒ <strong>C ≈ 4,9×10⁻¹⁰ F = 0,49 nF</strong>"},
  {p:"2", prio:false, head:"Q2 · letra (c)", term:"Carga máxima ligando na pilha (fem = 1,5 V)",
   ans:"Q = C·V = 4,9×10⁻¹⁰ × 1,5\n⇒ <strong>Q ≈ 7,3×10⁻¹⁰ C = 0,73 nC</strong>"},
  {p:"2", prio:false, head:"Q2 · letra (d)", term:"Máxima ddp sem queimar (rigidez 16 kV/mm)",
   ans:"A rigidez dielétrica é o campo máximo antes de faiscar.\n<strong>V_max = E_rig · d</strong> = 16 kV/mm × 0,5 mm\n⇒ <strong>V_max = 8 kV</strong> (8000 V)"},
  {p:"2", prio:false, head:"Q2 · variante", term:"Se cair o CILÍNDRICO + titanato de estrôncio (κ = 233)",
   ans:"(a) C₀ = 2πε₀ℓ/ln(b/a) ≈ <strong>16,5 pF</strong> (a=0,5mm, b=0,7mm, ℓ=10cm).\n(b) com dielétrico: C = κ·C₀ = 233 × 16,5 pF ≈ <strong>3,8 nF</strong>.\n(c) ddp máx: no cilíndrico o campo é máximo em r = a ⇒ V_max = E_rig·a·ln(b/a)."},

  // ===================== Q3 — CORRENTE ELÉTRICA =====================
  {p:"3", prio:true, head:"Enunciado", term:"Q3 — Corrente e velocidade de drift (a mais 'plugar número')",
   ans:"Fio de cobre, A = 3,31×10⁻⁶ m², corrente i = 10 A.\nDados: ρ_massa = 8,92 g/cm³, M = 63,5 g/mol, N_A = 6,02×10²³, e = 1,6×10⁻¹⁹ C.\nPede: (a) densidade η de elétrons livres · (b) velocidade de drift v_d · (c) por que a lâmpada acende na hora."},
  {p:"3", prio:true, head:"Q3 · letra (a)", term:"Densidade η de elétrons de condução do cobre",
   ans:"1 elétron livre por átomo: <strong>η = ρ_massa · N_A / M</strong>.\n⚠️ Unidades: ρ = 8,92×10³ kg/m³, M = 63,5×10⁻³ kg/mol.\nη = (8,92×10³ × 6,02×10²³)/(63,5×10⁻³)\n⇒ <strong>η ≈ 8,5×10²⁸ elétrons/m³</strong>"},
  {p:"3", prio:true, head:"Q3 · letra (b)", term:"Velocidade de drift v_d",
   ans:"Da relação <strong>i = η·A·v_d·e</strong>:\n<strong>v_d = i / (η·A·e)</strong>\n= 10 / (8,5×10²⁸ × 3,31×10⁻⁶ × 1,6×10⁻¹⁹)\n= 10 / (4,5×10⁴)\n⇒ <strong>v_d ≈ 2,2×10⁻⁴ m/s</strong>  (~0,2 mm/s!)"},
  {p:"3", prio:true, head:"Q3 · letra (c)", term:"Por que a lâmpada acende quase instantaneamente?",
   ans:"Apesar do v_d minúsculo, o que se propaga pelo fio é o <strong>campo elétrico</strong>, a quase a <strong>velocidade da luz</strong>. Ele coloca <strong>todos</strong> os elétrons do circuito em movimento quase ao mesmo tempo. Não é um elétron que 'viaja' do interruptor até a lâmpada."},

  // ===================== Q4 — RESISTÊNCIA =====================
  {p:"4", prio:false, head:"Enunciado", term:"Q4 — Resistência (a mais difícil — deixe por último)",
   ans:"Material ôhmico. Pede:\n(a) com as 2 leis de Ohm + o MUV do elétron entre choques (modelo de Drude), <strong>mostrar que ρ = m/(η e² τ)</strong>;\n(b) estimar τ do cobre (ρ = 1,7×10⁻⁸ Ω·m).\nO professor só mandou ler o capítulo — se faltar tempo, é a que você sacrifica."},
  {p:"4", prio:false, head:"Q4 · (a) parte 1", term:"Lado MACRO: chegar em J = E/ρ",
   ans:"2ª lei de Ohm: <strong>R = ρL/A</strong>. 1ª lei: ddp = R·i.\nJ = i/A = ddp/(R·A) = ddp/(ρL)  [pois R·A = ρL].\nCampo uniforme: ddp = E·L ⇒ J = E·L/(ρL)\n⇒ <strong>J = E/ρ</strong>   … (i)"},
  {p:"4", prio:false, head:"Q4 · (a) parte 2", term:"Lado MICRO (Drude) → resultado ρ = m/(η e² τ)",
   ans:"Força no elétron: F = −eE. MUV entre choques: v = v₀ − (eE/m)t.\nMédia p/ N ≫ 1 choques (⟨v₀⟩ = 0, ⟨t⟩ = τ):\n<strong>⟨v⟩ = eEτ/m</strong>.\nJ = η·e·⟨v⟩ = <strong>(ηe²τ/m)·E</strong>   … (ii)\nComparando (i) = (ii): 1/ρ = ηe²τ/m\n⇒ <strong>ρ = m/(η e² τ)</strong> ✅"},
  {p:"4", prio:false, head:"Q4 · letra (b)", term:"Estimar o tempo entre colisões τ do cobre",
   ans:"Isolando: <strong>τ = m/(η e² ρ)</strong>\n= 9,11×10⁻³¹ / (8,5×10²⁸ × (1,6×10⁻¹⁹)² × 1,7×10⁻⁸)\n= 9,11×10⁻³¹ / 3,7×10⁻¹⁷\n⇒ <strong>τ ≈ 2,5×10⁻¹⁴ s</strong>"},

  // ===================== EXTRA — SÉRIE / PARALELO =====================
  {p:"x", prio:true, head:"Enunciado", term:"Extra (1,0 pt) — Demonstração: capacitores em série e paralelo",
   ans:"Duas demonstrações curtas e sempre iguais. A chave:\n<strong>Paralelo</strong> → mesma <strong>ddp</strong>, as cargas somam.\n<strong>Série</strong> → mesma <strong>carga</strong>, as ddps somam.\nUm semestre ainda pediu: mostrar que C_s &lt; C₁ &lt; C₂ &lt; C_p."},
  {p:"x", prio:true, head:"Extra · paralelo", term:"Dedução do PARALELO (C_p = C₁ + C₂)",
   ans:"Os dois capacitores têm a mesma ddp = ℰ.\nCarga total: Q = Q₁ + Q₂ = C₁ℰ + C₂ℰ = (C₁ + C₂)ℰ.\nMas Q = C_p·ℰ, logo:\n⇒ <strong>C_p = C₁ + C₂</strong> ✅  (equivalente MAIOR que qualquer um)"},
  {p:"x", prio:true, head:"Extra · série", term:"Dedução da SÉRIE (1/C_s = 1/C₁ + 1/C₂)",
   ans:"A carga Q é a MESMA nos dois (indução).\nℰ = ΔV₁ + ΔV₂ = Q/C₁ + Q/C₂ = Q(1/C₁ + 1/C₂).\nComo ℰ = Q/C_s:\n⇒ <strong>1/C_s = 1/C₁ + 1/C₂</strong>\n⇒ <strong>C_s = C₁C₂/(C₁ + C₂)</strong> ✅  (equivalente MENOR que qualquer um)"},
  {p:"x", prio:true, head:"Extra · ordenação", term:"Mostrar que C_s < C₁ < C₂ < C_p (dado C₁ < C₂)",
   ans:"<strong>Paralelo</strong>: C_p = C₁ + C₂ &gt; C₂ (somou algo positivo) ✅\n<strong>Série</strong>: C_s = C₁C₂/(C₁+C₂). Como C₂/(C₁+C₂) &lt; 1 ⇒ C_s &lt; C₁ ✅\nJuntando: <strong>C_s &lt; C₁ &lt; C₂ &lt; C_p</strong> ✅"},
];

const BLK = {"plano":"plano de ataque","1":"Q1 · capacitância","2":"Q2 · dielétricos","3":"Q3 · corrente","4":"Q4 · resistência","x":"★ extra · série/paralelo"};
function blkName(c){ return BLK[c.p] || ("bloco "+c.p); }
function bclass(c){ return c.p==="plano"?"bp":(c.p==="x"?"bx":"b"+c.p); }

const $ = s => document.querySelector(s);
const card=$("#card"), front=$("#front"), back=$("#back"), empty=$("#empty");
let order = CARDS.map((_,i)=>i);
let deck="all", pdeck="all", hideKnown=false, cursor=0, flipped=false;
const known = new Set();

function deckMatch(id){
  const c = CARDS[id];
  return (deck==="all" || (deck==="prio" && c.prio)) && (pdeck==="all" || String(c.p)===pdeck);
}
function visible(){ return order.filter(id => deckMatch(id) && (!hideKnown || !known.has(id))); }

function renderFront(c){
  return '<div class="tag"><span class="lbl">'+(c.head||"Questão")+'</span><span class="side">'+blkName(c)+'</span></div>'+
         '<div class="term">'+c.term+'</div>'+
         '<div class="hint">↺ toque para a resolução</div>';
}
function renderBack(c){
  return '<div class="tag"><span class="lbl">Resolução</span><span class="side">'+blkName(c)+'</span></div>'+
         '<div class="answer">'+c.ans.replace(/\n/g,"<br>")+'</div>';
}

function render(){
  const vis = visible();
  const total = vis.length;
  document.querySelector(".stage").hidden = false;
  if(total===0){
    card.style.display="none"; empty.hidden=false;
  }else{
    card.style.display=""; empty.hidden=true;
    if(cursor>=total) cursor=total-1;
    if(cursor<0) cursor=0;
    const id = vis[cursor], c = CARDS[id];
    card.className = "card "+bclass(c)+(known.has(id)?" known":"");
    flipped=false;
    front.innerHTML = renderFront(c);
    back.innerHTML = renderBack(c);
    card.dataset.id = id;
  }
  $("#pos").textContent = total? (cursor+1):0;
  $("#total").textContent = total;
  $("#progfill").style.width = total? (((cursor+1)/total)*100+"%") : "0%";
  const deckIds = order.filter(deckMatch);
  const dk = deckIds.filter(id=>known.has(id)).length;
  $("#dom").textContent = "dominadas "+dk+"/"+deckIds.length;
  $("#know").classList.toggle("on", total && known.has(vis[cursor]));
  $("#hide").classList.toggle("on", hideKnown);
}

function flip(){ if(card.style.display==="none")return; flipped=!flipped; card.classList.toggle("flip",flipped); }
function go(d){ const t=visible().length; if(!t)return; cursor=(cursor+d+t)%t; render(); }
function markKnown(){
  const vis=visible(); if(!vis.length)return;
  const id=vis[cursor];
  if(known.has(id)) known.delete(id); else known.add(id);
  render();
}
function shuffle(){
  let seed = (Date.now?Date.now():order.length*97) ^ (cursor*2654435761);
  const rnd=()=>{ seed=(seed*1664525+1013904223)>>>0; return seed/4294967296; };
  for(let i=order.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
  cursor=0; render();
}

document.querySelectorAll(".chip[data-deck]").forEach(ch=>ch.addEventListener("click",()=>{
  document.querySelectorAll(".chip[data-deck]").forEach(x=>x.setAttribute("aria-pressed","false"));
  ch.setAttribute("aria-pressed","true");
  deck=ch.dataset.deck; cursor=0; render();
}));
document.querySelectorAll(".chip[data-pdeck]").forEach(ch=>ch.addEventListener("click",()=>{
  document.querySelectorAll(".chip[data-pdeck]").forEach(x=>x.setAttribute("aria-pressed","false"));
  ch.setAttribute("aria-pressed","true");
  pdeck=ch.dataset.pdeck; cursor=0; render();
}));
card.addEventListener("click", flip);
$("#flip").addEventListener("click", flip);
$("#prev").addEventListener("click", ()=>go(-1));
$("#next").addEventListener("click", ()=>go(1));
$("#know").addEventListener("click", markKnown);
$("#hide").addEventListener("click", ()=>{ hideKnown=!hideKnown; cursor=0; render(); });
$("#shuffle").addEventListener("click", shuffle);
$("#reset").addEventListener("click", ()=>{ known.clear(); hideKnown=false; deck="all"; pdeck="all";
  document.querySelectorAll(".chip[data-deck]").forEach(x=>x.setAttribute("aria-pressed", x.dataset.deck==="all"?"true":"false"));
  document.querySelectorAll(".chip[data-pdeck]").forEach(x=>x.setAttribute("aria-pressed", x.dataset.pdeck==="all"?"true":"false"));
  order=CARDS.map((_,i)=>i); cursor=0; render(); });

document.addEventListener("keydown",e=>{
  const tag=(e.target.tagName||"");
  if(e.key==="ArrowRight"){ go(1); e.preventDefault(); }
  else if(e.key==="ArrowLeft"){ go(-1); e.preventDefault(); }
  else if(e.key===" "||e.key==="Enter"){ if(tag==="BUTTON")return; flip(); e.preventDefault(); }
  else if(e.key==="k"||e.key==="K"){ markKnown(); }
  else if(e.key==="s"||e.key==="S"){ shuffle(); }
});

render();
</script>
</head><body></body></html>
